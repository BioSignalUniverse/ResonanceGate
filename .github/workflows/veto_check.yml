name: ResonanceGate - Veto Mandate Integrity Check  

# Triggers the workflow on Pull Requests targeting the 'main' branch
on:
  pull_request:
    branches: [ main ]
  # Also runs if code is pushed directly to main (final safety check)
  push:
    branches: [ main ]

jobs:
  goa_test_suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # Install necessary libraries for the Veto Gate logic (numpy is essential)
          pip install numpy websockets

      - name: Run ITP (Goa Test Suite) 🚀
        # This executes the Integration Testing Protocol (ITP) script
        run: python integration_testing_protocol.py
        
      - name: Check Certification Report Integrity
        # Ensures the report file was successfully generated by the ITP
        run: |
          if [ ! -f RESONANCEGATE_CERTIFICATION.md ]; then
            echo "❌ ERROR: ITP failed to generate the certification report."
            exit 1
          fi

      - name: Check Latency Requirement
        # Reads the max latency from the generated report
        run: |
          LATENCY_MS=$(grep 'Maximum Latency:' RESONANCEGATE_CERTIFICATION.md | awk '{print $NF}' | sed 's/ms//')
          MAX_ACCEPTABLE=100
          
          # Use 'bc' for floating-point comparison
          if [ "$(echo "$LATENCY_MS > $MAX_ACCEPTABLE" | bc -l)" -eq 1 ]; then
            echo "❌ LATENCY FAILURE: Max latency of $LATENCY_MS ms exceeds the 100ms requirement."
            exit 1
          else
            echo "✅ Latency Check Passed: ${LATENCY_MS}ms"
          fi

